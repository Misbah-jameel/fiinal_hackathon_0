# Docker Compose for Cloud Agent
# Platinum Tier: Always-On Cloud Executive

version: '3.8'

services:
  # Cloud Agent - Main service
  cloud-agent:
    build:
      context: ../..
      dockerfile: platinum/deploy/Dockerfile.cloud
    container_name: ai-employee-cloud
    restart: unless-stopped
    environment:
      - GIT_REMOTE=${GIT_REMOTE}
      - VAULT_PATH=/app/AI_Employee_Vault
      - AGENT_ID=cloud_agent
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-60}
      - GMAIL_CHECK_INTERVAL=${GMAIL_CHECK_INTERVAL:-120}
      - SOCIAL_CHECK_INTERVAL=${SOCIAL_CHECK_INTERVAL:-300}
      # API Credentials (from .env)
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - TWITTER_API_SECRET=${TWITTER_API_SECRET}
      - FACEBOOK_ACCESS_TOKEN=${FACEBOOK_ACCESS_TOKEN}
      - LINKEDIN_ACCESS_TOKEN=${LINKEDIN_ACCESS_TOKEN}
    volumes:
      - vault_data:/app/AI_Employee_Vault
      - ./logs:/app/Logs
    networks:
      - ai-employee-network
    depends_on:
      - odoo
      - redis

  # Odoo Community - Accounting & ERP
  odoo:
    image: odoo:19.0-community
    container_name: ai-employee-odoo
    restart: unless-stopped
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=${ODOO_DB_PASSWORD:-odoo123}
    volumes:
      - odoo_data:/var/lib/odoo
      - ./odoo/config:/etc/odoo
    ports:
      - "8069:8069"
    networks:
      - ai-employee-network
    depends_on:
      - db

  # PostgreSQL for Odoo
  db:
    image: postgres:15
    container_name: ai-employee-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=${ODOO_DB_PASSWORD:-odoo123}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - ai-employee-network

  # Redis - Cache and session storage
  redis:
    image: redis:7-alpine
    container_name: ai-employee-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - ai-employee-network

  # Nginx - Reverse proxy (optional, for HTTPS)
  nginx:
    image: nginx:alpine
    container_name: ai-employee-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - odoo
    networks:
      - ai-employee-network
    profiles:
      - https

volumes:
  vault_data:
    driver: local
  odoo_data:
    driver: local
  db_data:
    driver: local
  redis_data:
    driver: local

networks:
  ai-employee-network:
    driver: bridge
